key_binder:
  __append:
### 避 RIME 原設定鍵位衝突 ###
    - {accept: comma, send: comma, when: has_menu}
    - {accept: comma, send: comma, when: paging}
    - {accept: period, send: period, when: has_menu}
    - {accept: period, send: period, when: paging}
    - {accept: minus, send: minus, when: has_menu}
    - {accept: minus, send: minus, when: paging}
    - {accept: equal, send: equal, when: has_menu}
    - {accept: equal, send: equal, when: paging}
########################## 方向鍵：切分移位 和 翻頁 ##########################
### 翻頁時，回復到 composing 狀態 ###
#關#    - {accept: Shift+space, send: Shift+Left, when: paging} #於選單列選字時，回復到輸入列（避免有時回復不了，故增加）。
    - {accept: Tab, send: Shift+Left, when: paging} #於選單列選字時，回復到輸入列（避免有時回復不了，故增加）。
    # - {accept: Tab, send: Control+Left, when: paging} #有bug #於選單列選字時，回復到輸入列（避免有時回復不了，故增加）。比「send: Shift+Left」好的是多了限定功能，不只是死板地從末尾回退一個字。會根據目前注音長度，重新框列此長度所有詞彙。
#測試
    # - {accept: Tab, send: Shift+Right, when: has_menu} #？？加了會有問題，不能加！！！
    # - {accept: Tab, send: Shift+Right, when: composing}
    # - {accept: Tab, send: Control+Left, when: has_menu}
    # - {accept: Tab, send: Control+Right, when: paging}
    # - {accept: Tab, send: ISO_Left_Tab, when: paging}
### 切分移位 ###
    - {accept: Up, send: KP_Left, when: composing} #左移一個注音
    - {accept: Up, send: Up, when: paging} #修正上條目出現的bug
##
    - {accept: Right, send: Shift+Right, when: composing} #右移一整個字
    - {accept: Shift+Right, send: Right, when: composing} #右移一個注音
    - {accept: Shift+Left, send: KP_Left, when: composing} #左移一個注音
#關#    - {accept: Shift+space, send: Shift+Right, when: composing} #首節
    # - {accept: Shift+space, send: KP_Left, when: composing} #左移一個注音
    # - {accept: Left, send: KP_Left, when: composing} #左移一個注音
##
    # - {accept: Shift+Tab, send: Right, when: composing} #右移一個注音
    # - {accept: Tab, send: KP_Left, when: composing} #左移一個注音
### 選字翻頁 ###
## 直式選單（stacked-horizontal） ##
#不符合#    - {accept: Right, send: Page_Down, when: has_menu}
    - {accept: Left, send: Page_Up, when: paging} #has_menu
    - {accept: Right, send: Page_Down, when: paging} #has_menu
## 橫式選單（linear-horizontal） ##
#可不用#    - {accept: Up, send: Page_Up, when: paging}
#可不用#    - {accept: Down, send: Page_Down, when: paging}
#可不用#    - {accept: Left, send: Left, when: has_menu}
    # - {accept: Right, send: Right, when: has_menu} #校正前面
    # - {accept: Shift+Right, send: Shift+Right, when: composing} #校正前面
    # - {accept: Left, send: Left, when: paging} #send: Shift+Up
    # - {accept: Right, send: Right, when: paging} #send: Shift+Down
## 新版 selector 自動辨認（還是需要額外附加校正，因為前面切分有特別設定） ##
    # - {accept: Up, send: Control+Up, when: paging}
    # - {accept: Down, send: Control+Down, when: paging}
    # - {accept: Left, send: Control+Left, when: paging}
    # - {accept: Right, send: Control+Right, when: paging}
# 橫式時（linear-horizontal）需開啟校正前面
    # - {accept: Right, send: Right, when: has_menu}
    # - {accept: Shift+Right, send: Shift+Right, when: composing}
# 中文式時（vertical）需開啟校正前面
    # - {accept: Up, send: Up, when: has_menu}
    # - {accept: Down, send: Down, when: has_menu}
##########################################################################
#其他快捷鍵翻頁
    - {accept: Shift+Up, send: Page_Up, when: paging} #選字時「Shift」+「上」翻頁。
    - {accept: Shift+Down, send: Page_Down, when: has_menu} #選字時「Shift」+「下」翻頁。
#關#    - {accept: Shift+Tab, send: Page_Up, when: paging} #選字時「Shift」+「tab」翻頁。
#關#    - {accept: Tab, send: Page_Down, when: has_menu} #「tab」翻頁。
### 空白鍵 ###
    - {accept: space, send: Return, when: paging} #方向鍵選字時，space直接上屏（避免被一聲空格影響）
    # - {accept: space, send: Page_Down, when: paging} #方向鍵選字時，space翻頁（上條遮屏需開啟，否則「=」+「符號」會誤按）
    # - {accept: space, send: Down, when: has_menu}
    # - {accept: space, send: Down, when: paging}
    # - {accept: space, send: space, when: composing}
#關#    - {accept: space, send: Escape, when: composing} #空碼時，按空格清除
#關#    - {accept: space, send: space, when: has_menu} #非空碼時，空白還是空白
### 刪除鍵 ###
    - {accept: BackSpace, send: Control+BackSpace, when: has_menu} #〔關〕刪除前一個拼音字符〔開〕：刪除整組拼音字符（一個字）
    - {accept: Shift+BackSpace, send: BackSpace, when: has_menu}
    - {accept: backslash, send: BackSpace, when: has_menu} #「\」鍵位刪除一個拼音字符。
    # - {accept: backslash, send: Shift+BackSpace, when: has_menu} #「\」鍵位刪除整組拼音字符（一個字）。
#關#    - {accept: backslash, send: Shift+Return, when: has_menu} #「\」鍵位上屏英文。
### 功能快捷鍵 ###
    # - {accept: Return, send: space, when: has_menu}
    # - {accept: Control+bracketright, toggle: back_mark, when: always } #「國際音標和符號」提示碼開關
    # - {accept: Control+apostrophe, toggle: character_range_bhjm, when: always} #accept: Control+semicolon
    # - {accept: Control+equal, toggle: en_sort, when: always} #「easy」選單排序是否照英漢字典順序
## 上排切換(Mac)
    - {accept: Control+Shift+6, toggle: character_range_bhjm, when: always} #誤按沒警示，避免誤按，可關閉！（開關台灣習慣用字）
    - {accept: Control+Shift+7, toggle: emoji_segestion, when: always} #誤按沒警示，避免誤按，可關閉！（開關跟隨的emoji）
    - {accept: Control+Shift+8, toggle: back_mark, when: always} #誤按沒警示，避免誤按，可關閉！（開關標註）
    - {accept: Control+Shift+9, toggle: unicode_comment, when: always}
    - {accept: Control+Shift+0, toggle: en_sort, when: always} #誤按沒警示，避免誤按，可關閉！(「排序Easy如同英漢字典」開關）
## 上排切換(Win)
    - {accept: Control+Shift+asciicircum, toggle: character_range_bhjm, when: always} #誤按沒警示，避免誤按，可關閉！（開關台灣習慣用字）
    - {accept: Control+Shift+ampersand, toggle: emoji_segestion, when: always} #誤按沒警示，避免誤按，可關閉！（開關跟隨的emoji）
    - {accept: Control+Shift+asterisk, toggle: back_mark, when: always} #誤按沒警示，避免誤按，可關閉！（開關標註）
    - {accept: Control+Shift+parenleft, toggle: unicode_comment, when: always}
    - {accept: Control+Shift+parenright, toggle: en_sort, when: always} #誤按沒警示，避免誤按，可關閉！(「排序Easy如同英漢字典」開關）
## 切換樣態
    # - { accept: Control+comma, set_option: ascii_mode, when: always }
