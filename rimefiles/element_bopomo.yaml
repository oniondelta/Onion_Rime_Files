#### 以下「空格」調整上下排（英文和注音）對齊用 ####
##  「 」：\u0020 一般打字輸入空格，（不與en space同寬）
##  「 」：\u2002 是1/2 em（en space）
##  「 」：\u2003 是1 em（em space）
##  「 」：\u2004 是1/3 em
##  「 」：\u2005 是1/4 em
##  「 」：\u2006 是1/6 em
##  「 」：\u2007 是圖形空間的寬度（用於分隔數字之定位符，與單一數字同寬）
##  「 」：\u2008 是標點符號的寬度（與同字型之窄標點同寬，即句號或逗號（西方語文）之寬度）
##  「　」：\u3000 是全形文字的寬度（表意文字空格，與CJK文字同寬）

